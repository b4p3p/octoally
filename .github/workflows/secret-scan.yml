name: secret-scan

# Backstop for the local pre-commit hook: scan the full git history for leaked
# secrets on every push and pull request. Local hooks can be bypassed
# (--no-verify); this cannot.

on:
  push:
  pull_request:

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so gitleaks can scan past commits

      - name: Install gitleaks (latest release)
        run: |
          tag="$(curl -fsSL https://api.github.com/repos/gitleaks/gitleaks/releases/latest \
            | grep -oP '"tag_name":\s*"v\K[^"]+')"
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${tag}/gitleaks_${tag}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Scan git history for secrets
        run: gitleaks detect --no-banner --redact -v
