name: Test macOS Hook Fix
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'OctoAlly version to test (e.g. 1.0.54 or latest)'
        required: false
        default: 'latest'

jobs:
  test-macos:
    runs-on: macos-latest
    steps:
      - name: Install OctoAlly
        run: |
          npx -y octoally@${{ github.event.inputs.version }} &
          INSTALL_PID=$!
          sleep 30
          kill $INSTALL_PID 2>/dev/null || true

      - name: Check OctoAlly version
        run: |
          echo "=== Server version ==="
          grep version ~/octoally/server/package.json | head -1 || echo "not found"
          echo "=== Server dist ==="
          ls ~/octoally/server/dist/index.js 2>/dev/null && echo "YES" || echo "NO"

      - name: Check ruflo install
        run: |
          echo "=== Ruflo binary ==="
          ls -la ~/.octoally/ruflo/node_modules/.bin/ruflo 2>/dev/null || echo "NOT FOUND at .octoally"
          ls -la ~/.hivecommand/ruflo/node_modules/.bin/ruflo 2>/dev/null || echo "NOT FOUND at .hivecommand"

      - name: Check for stale agentdb
        run: |
          echo "=== Stale agentdb in ruflo install ==="
          find ~/.octoally/ruflo/node_modules -name "package.json" -path "*/agentdb/*" 2>/dev/null | while read f; do echo "$f: $(grep version "$f" | head -1)"; done
          echo "=== Stale npx caches ==="
          for dir in ~/.npm/_npx/*/; do
            [ -d "$dir" ] || continue
            if [ -f "${dir}node_modules/@claude-flow/cli/package.json" ]; then
              echo "FOUND: $dir"
              ls "${dir}node_modules/agentdb/package.json" 2>/dev/null && echo "  HAS STALE AGENTDB" || echo "  clean"
            fi
          done
          echo "done"

      - name: Run ruflo init and check hooks
        run: |
          mkdir -p ~/test-project && cd ~/test-project
          echo "=== Running ruflo init ==="
          if [ -f ~/.octoally/ruflo/node_modules/.bin/ruflo ]; then
            ~/.octoally/ruflo/node_modules/.bin/ruflo init --force 2>&1 | tail -20 || echo "ruflo init failed"
          else
            echo "No ruflo binary"; exit 0
          fi
          echo "=== Stop hooks ==="
          grep -A8 '"Stop"' .claude/settings.json 2>/dev/null || echo "No Stop hooks"
          echo "=== session-end.sh ==="
          cat .claude/hooks/session-end.sh 2>/dev/null || echo "No session-end.sh"

      - name: Test ruflo hooks session-end
        run: |
          cd ~/test-project
          if [ ! -f ~/.octoally/ruflo/node_modules/.bin/ruflo ]; then echo "No ruflo"; exit 0; fi
          echo "=== Testing session-end (5s timeout) ==="
          perl -e 'alarm 5; exec @ARGV' ~/.octoally/ruflo/node_modules/.bin/ruflo hooks session-end --generate-summary true --persist-state true --export-metrics true 2>&1
          echo "EXIT: $?"

      - name: Test server startup migration
        run: |
          cd ~/octoally
          node -e "const D=require('better-sqlite3'),p=require('path'),o=require('os');const d=new D(p.join(o.homedir(),'.octoally','octoally.db'));d.exec('CREATE TABLE IF NOT EXISTS projects(id TEXT PRIMARY KEY,name TEXT,path TEXT,description TEXT,ruflo_prompt TEXT,openclaw_prompt TEXT,default_web_url TEXT,created_at TEXT,updated_at TEXT)');d.prepare('INSERT OR IGNORE INTO projects(id,name,path)VALUES(?,?,?)').run('t1','test',p.join(o.homedir(),'test-project'));d.close();console.log('DB ready')" 2>&1 || echo "DB setup failed"
          echo "=== Server startup (8s capture) ==="
          timeout 8 node server/dist/index.js 2>&1 || true
